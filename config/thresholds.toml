# Lens-rule paradigm trigger thresholds.
#
# 초기값은 의도적으로 느슨하게 — false positive를 일부러 허용해
# 실제 잘못 발화한 case를 보며 조여나간다 (reactive 원칙).
#
# severity quantize는 자동: |val| < 2τ면 minor, 이상이면 major.
# 별도 magic number 없음.

[thresholds]
# delta_diff (z-score/frame): DTW path 위 learner-time 윈도우 내 (l_mean − n_mean)
# trigger = rules.py가 DTW path 직접 계산 (lens 무관, 어절 평균 v2 폐기 → 윈도우 v3)
pitch_rising_excess  = 0.1
pitch_falling_excess = 0.1

# z_diff (z-score): |z_learner_eojeol_mean − z_native_eojeol_mean|
# trigger = f0_extractor에서 직접 계산
pitch_offset = 0.8

# duration_ratio = max(learner_syll_dur / native_syll_dur), 음절 단위
# trigger lens = syllable_noalign
syllable_elongation = 2.5

# duration_ratio = learner_eojeol_dur / native_eojeol_dur
# trigger lens = eojeol_noalign
eojeol_slow = 2.5

[window]
# learner 어절 시간 비율 기준. DTW path 위에서 평가하되 윈도우 경계는 learner 시간으로.
size_ratio   = 0.1     # 윈도우 폭 = learner 어절의 25% (≈ 1음절)
stride_ratio = 0.05    # 50% overlap → 어절당 7개 윈도우
